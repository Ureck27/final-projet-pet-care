services:
  - type: web
    name: petcare-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: ADMIN_EMAIL
        sync: false
    # To keep your local file uploads persistent on Render, you need a Persistent Disk:
    # disk:
    #   name: petcare-uploads
    #   mountPath: /opt/render/project/src/uploads
    #   sizeGB: 1
